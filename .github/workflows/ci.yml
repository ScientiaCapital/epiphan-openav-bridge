name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-pearl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
      - run: bash ./init-framework-mod.sh
        working-directory: openav-epiphan-pearl
      - run: go test ./source/ -v
        working-directory: openav-epiphan-pearl

  go-ec20:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
      - run: bash ./init-framework-mod.sh
        working-directory: openav-epiphan-ec20
      - run: go test ./source/ -v
        working-directory: openav-epiphan-ec20

  openav-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: openav-mcp
      - run: ruff check .
        working-directory: openav-mcp
      - run: pytest -q
        working-directory: openav-mcp

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [openav-epiphan-pearl, openav-epiphan-ec20]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
      - run: docker build -t ${{ matrix.service }} ./${{ matrix.service }}
